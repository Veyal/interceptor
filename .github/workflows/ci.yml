name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: vet
        run: go vet ./...
      - name: test (race)
        run: go test -race ./...
      - name: build (static)
        run: CGO_ENABLED=0 go build ./cmd/interceptor
