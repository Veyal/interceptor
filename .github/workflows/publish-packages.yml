# Optional package-manager publish. Requires secrets:
#   HOMEBREW_TAP_TOKEN  — PAT with contents:write on Veyal/homebrew-tap
#   SCOOP_BUCKET_TOKEN  — PAT with contents:write on Veyal/scoop-bucket
# Missing secrets → skip (exit 0). Never blocks the core Release workflow.
name: Publish package managers

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v1.5.2)
        required: true

permissions:
  contents: read

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN unset — skip Homebrew"
            exit 0
          fi
          VER="${TAG#v}"
          SUMS=$(curl -fsSL "https://github.com/Veyal/interseptor/releases/download/${TAG}/checksums.txt")
          sha_arm=$(echo "$SUMS" | awk -v a="interseptor_${VER}_darwin_arm64.tar.gz" '$2==a{print $1;exit}')
          sha_amd=$(echo "$SUMS" | awk -v a="interseptor_${VER}_darwin_amd64.tar.gz" '$2==a{print $1;exit}')
          test -n "$sha_arm" && test -n "$sha_amd"
          tmp=$(mktemp -d)
          git clone --depth 1 "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Veyal/homebrew-tap.git" "$tmp/tap"
          mkdir -p "$tmp/tap/Formula"
          python3 - <<PY
          from pathlib import Path
          ver, tag = "${VER}", "${TAG}"
          sha_arm, sha_amd = "${sha_arm}", "${sha_amd}"
          Path("$tmp/tap/Formula/interseptor.rb").write_text(f'''class Interseptor < Formula
            desc "Intercepting HTTP/HTTPS proxy + security toolkit (single static Go binary)"
            homepage "https://github.com/Veyal/interseptor"
            license "MIT"
            version "{ver}"

            on_arm do
              url "https://github.com/Veyal/interseptor/releases/download/{tag}/interseptor_{ver}_darwin_arm64.tar.gz"
              sha256 "{sha_arm}"
            end
            on_intel do
              url "https://github.com/Veyal/interseptor/releases/download/{tag}/interseptor_{ver}_darwin_amd64.tar.gz"
              sha256 "{sha_amd}"
            end

            def install
              bin.install "interseptor"
            end

            test do
              assert_match "interseptor v", shell_output("#{{bin}}/interseptor version")
            end
          end
          ''')
          PY
          cd "$tmp/tap"
          git config user.name "interseptor-bot"
          git config user.email "noreply@github.com"
          git add Formula/interseptor.rb
          git diff --cached --quiet || git commit -m "interseptor ${VER}"
          git push origin HEAD:main

      - name: Update Scoop bucket
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${SCOOP_BUCKET_TOKEN:-}" ]; then
            echo "SCOOP_BUCKET_TOKEN unset — skip Scoop"
            exit 0
          fi
          VER="${TAG#v}"
          SUMS=$(curl -fsSL "https://github.com/Veyal/interseptor/releases/download/${TAG}/checksums.txt")
          sha64=$(echo "$SUMS" | awk -v a="interseptor_${VER}_windows_amd64.zip" '$2==a{print $1;exit}')
          shaarm=$(echo "$SUMS" | awk -v a="interseptor_${VER}_windows_arm64.zip" '$2==a{print $1;exit}')
          test -n "$sha64" && test -n "$shaarm"
          tmp=$(mktemp -d)
          git clone --depth 1 "https://x-access-token:${SCOOP_BUCKET_TOKEN}@github.com/Veyal/scoop-bucket.git" "$tmp/bucket"
          python3 - <<PY
          import json
          from pathlib import Path
          ver, tag = "${VER}", "${TAG}"
          doc = {
            "version": ver,
            "description": "Intercepting HTTP/HTTPS proxy + security toolkit (single static Go binary)",
            "homepage": "https://github.com/Veyal/interseptor",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": f"https://github.com/Veyal/interseptor/releases/download/{tag}/interseptor_{ver}_windows_amd64.zip",
                "hash": "${sha64}",
              },
              "arm64": {
                "url": f"https://github.com/Veyal/interseptor/releases/download/{tag}/interseptor_{ver}_windows_arm64.zip",
                "hash": "${shaarm}",
              },
            },
            "bin": "interseptor.exe",
            "checkver": {"github": "https://github.com/Veyal/interseptor"},
            "autoupdate": {
              "architecture": {
                "64bit": {"url": "https://github.com/Veyal/interseptor/releases/download/v$version/interseptor_$version_windows_amd64.zip"},
                "arm64": {"url": "https://github.com/Veyal/interseptor/releases/download/v$version/interseptor_$version_windows_arm64.zip"},
              }
            },
          }
          Path("$tmp/bucket/interseptor.json").write_text(json.dumps(doc, indent=2) + "\n")
          PY
          cd "$tmp/bucket"
          git config user.name "interseptor-bot"
          git config user.email "noreply@github.com"
          git add interseptor.json
          git diff --cached --quiet || git commit -m "interseptor ${VER}"
          git push origin HEAD:main
