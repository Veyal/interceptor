name: release

# Cross-compiles static binaries and attaches them (with checksums) to the
# GitHub Release for every pushed v* tag.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME}"
          mkdir -p dist
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            export GOOS="${t%/*}" GOARCH="${t#*/}" CGO_ENABLED=0
            name="interceptor_${VER}_${GOOS}_${GOARCH}"
            bin="interceptor"; [ "$GOOS" = windows ] && bin="interceptor.exe"
            mkdir -p "build/${name}"
            go build -trimpath -ldflags '-s -w' -o "build/${name}/${bin}" ./cmd/interceptor
            cp README.md LICENSE CHANGELOG.md "build/${name}/"
            if [ "$GOOS" = windows ]; then
              (cd build && zip -qr "../dist/${name}.zip" "${name}")
            else
              tar -czf "dist/${name}.tar.gz" -C build "${name}"
            fi
            echo "packaged ${name}"
          done
          (cd dist && sha256sum interceptor_* > checksums.txt)
          ls -la dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
